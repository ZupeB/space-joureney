<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Galaxy Explorer 🚀</title>
    <style>
        body {
            margin: 0;
            background-color: #020208;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #0a0a23 0%, #020208 100%);
            cursor: none;
        }
        .ui {
            position: absolute;
            top: 15px;
            left: 0;
            width: 100%;
            padding: 0 20px;
            box-sizing: border-box;
            font-size: 1.2rem;
            font-weight: bold;
            font-family: monospace;
            text-shadow: 0 0 8px #00ffff;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }
        
        /* The new Start Screen overlay */
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(2, 2, 8, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            cursor: pointer;
        }
        #startScreen h1 {
            color: #00ffff;
            font-family: monospace;
            text-shadow: 0 0 15px #00ffff;
        }
        #startScreen p {
            color: #ccc;
            font-family: monospace;
        }

        @media (max-width: 600px) {
            .ui { font-size: 0.9rem; padding: 0 15px; }
        }
    </style>
</head>
<body>

    <div id="startScreen">
        <h1>GALAXY EXPLORER</h1>
        <p>TAP OR CLICK TO LAUNCH</p>
    </div>

    <div class="ui">
        <div id="score">DISTANCE: 0 LY</div>
        <div id="speed">WARP: 4.2</div>
    </div>
    
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');

        // --- ASSET LOADING ---
        const asteroidImg = new Image();
        asteroidImg.src = 'asteroid.png'; // Make sure this matches your uploaded file name!

        const bgMusic = new Audio('soundtrack.mp3'); // Make sure this matches your uploaded file name!
        bgMusic.loop = true;
        bgMusic.volume = 0.5;

        // Dynamic Resizing
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let distance = 0;
        let gameOver = false;
        let gameStarted = false;

        // Player Vessel
        const player = {
            x: Math.min(100, window.innerWidth * 0.15), 
            y: canvas.height / 2,
            targetY: canvas.height / 2,
            smoothing: 0.25 
        };

        // Starfield
        const stars = [];
        for(let i=0; i<150; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2.5,
                speed: Math.random() * 4 + 0.5
            });
        }

        // Asteroids
        const asteroids = [];
        function spawnAsteroid() {
            if (gameOver || !gameStarted) return;
            asteroids.push({
                x: canvas.width + 50,
                y: Math.random() * canvas.height,
                radius: Math.random() * 25 + 15, // Made slightly bigger for the images
                speed: Math.random() * 5 + 3,
                rotation: 0,
                rotSpeed: (Math.random() - 0.5) * 0.05
            });
            setTimeout(spawnAsteroid, Math.random() * 800 + 400);
        }

        // Controls
        canvas.addEventListener('mousemove', (e) => {
            if (gameStarted && !gameOver) player.targetY = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            if (gameStarted && !gameOver) {
                player.targetY = e.touches[0].clientY;
                e.preventDefault();
            }
        }, { passive: false });

        function drawSpacecraft(x, y) {
            ctx.save();
            ctx.translate(x, y);

            // Engine Plasma Trail
            let trailLength = Math.random() * 25 + 15;
            let gradient = ctx.createLinearGradient(-10, 0, -trailLength, 0);
            gradient.addColorStop(0, '#00ffff');
            gradient.addColorStop(0.3, '#ff00aa');
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.moveTo(-10, -6);
            ctx.lineTo(-trailLength, 0);
            ctx.lineTo(-10, 6);
            ctx.closePath();
            ctx.fill();

            // Main Hull
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.moveTo(35, 0);
            ctx.lineTo(-15, -14);
            ctx.lineTo(-8, 0);
            ctx.lineTo(-15, 14);
            ctx.closePath();
            ctx.fill();

            // Cockpit
            ctx.fillStyle = '#00ffff';
            ctx.beginPath();
            ctx.ellipse(12, 0, 8, 3, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        // Main Game Loop
        function loop() {
            if (!gameStarted) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Stars
            stars.forEach(star => {
                if (!gameOver) star.x -= star.speed;
                if (star.x < 0) {
                    star.x = canvas.width;
                    star.y = Math.random() * canvas.height;
                }
                ctx.fillStyle = `rgba(255, 255, 255, ${star.size / 2.5})`;
                ctx.fillRect(star.x, star.y, star.size, star.size);
            });

            // Player
            player.y += (player.targetY - player.y) * player.smoothing;
            if (player.y < 25) player.y = 25;
            if (player.y > canvas.height - 25) player.y = canvas.height - 25;
            drawSpacecraft(player.x, player.y);

            // Asteroids
            asteroids.forEach((ast, idx) => {
                if (!gameOver) {
                    ast.x -= ast.speed;
                    ast.rotation += ast.rotSpeed;
                }

                ctx.save();
                ctx.translate(ast.x, ast.y);
                ctx.rotate(ast.rotation);
                
                // --- NEW IMAGE DRAWING METHOD ---
                // If the image is loaded, draw it. Otherwise, draw a backup circle.
                if (asteroidImg.complete && asteroidImg.naturalWidth !== 0) {
                    // Draw the image centered around x:0, y:0
                    ctx.drawImage(asteroidImg, -ast.radius, -ast.radius, ast.radius * 2, ast.radius * 2);
                } else {
                    ctx.fillStyle = '#565676';
                    ctx.beginPath();
                    ctx.arc(0, 0, ast.radius, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();

                // Collision Box
                let dist = Math.hypot(player.x - ast.x, player.y - ast.y);
                // We make the hitbox slightly smaller than the image so glancing blows don't kill you instantly
                if (dist < ast.radius * 0.8 + 10) {
                    gameOver = true;
                }

                if (ast.x < -100) asteroids.splice(idx, 1);
            });

            // UI Tracking
            if (!gameOver) {
                distance += 0.2;
                document.getElementById('score').innerText = `DISTANCE: ${Math.floor(distance)} LY`;
            } else {
                ctx.fillStyle = 'rgba(2, 2, 8, 0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                let isMobile = canvas.width < 600;
                
                ctx.fillStyle = '#ff3366';
                ctx.font = `bold ${isMobile ? 24 : 36}px monospace`;
                ctx.textAlign = 'center';
                ctx.fillText('HULL COMPROMISED', canvas.width / 2, canvas.height / 2 - 20);
                
                ctx.fillStyle = '#ffffff';
                ctx.font = `${isMobile ? 14 : 18}px monospace`;
                ctx.fillText(`Mapsd ${Math.floor(distance)} Light Years`, canvas.width / 2, canvas.height / 2 + 20);
                
                ctx.fillStyle = '#00ffff';
                ctx.fillText('TAP ANYWHERE TO RE-LAUNCH', canvas.width / 2, canvas.height / 2 + 60);
            }

            requestAnimationFrame(loop);
        }

        // Handle the initial start screen click
        startScreen.addEventListener('click', () => {
            startScreen.style.display = 'none'; // Hide the start screen
            gameStarted = true;
            
            // Start the music!
            bgMusic.play().catch(e => console.log("Audio play failed:", e));
            
            spawnAsteroid();
            requestAnimationFrame(loop);
        });

        // Handle Restarting after game over
        const handleRestart = (e) => {
            if (gameOver) {
                asteroids.length = 0;
                distance = 0;
                gameOver = false;
                player.y = canvas.height / 2;
                player.targetY = canvas.height / 2;
                spawnAsteroid();
            }
        };

        window.addEventListener('click', (e) => {
            if (e.target !== startScreen) handleRestart();
        });
        window.addEventListener('touchstart', (e) => {
            if (e.target !== startScreen) handleRestart();
        }, { passive: false });

    </script>
</body>
</html>
