<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- This meta tag is crucial for mobile: it prevents zooming and scales the page correctly -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Galaxy Explorer 🚀</title>
    <style>
        body {
            margin: 0;
            background-color: #020208;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden; /* Prevents scrollbars */
            touch-action: none; /* Prevents mobile browser actions like pull-to-refresh */
        }
        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #0a0a23 0%, #020208 100%);
            cursor: none;
        }
        .ui {
            position: absolute;
            top: 15px;
            left: 0;
            width: 100%;
            padding: 0 20px;
            box-sizing: border-box;
            font-size: 1.2rem;
            font-weight: bold;
            font-family: monospace;
            text-shadow: 0 0 8px #00ffff;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }
        .instructions {
            position: absolute;
            bottom: 25px;
            left: 0;
            width: 100%;
            text-align: center;
            color: #666a8a;
            font-size: 0.9rem;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
        }
        
        /* Media query specifically for smaller mobile screens */
        @media (max-width: 600px) {
            .ui { font-size: 0.9rem; padding: 0 15px; }
            .instructions { font-size: 0.75rem; bottom: 15px; }
        }
    </style>
</head>
<body>

    <div class="ui">
        <div id="score">DISTANCE: 0 LY</div>
        <div id="speed">WARP: 4.2</div>
    </div>
    
    <canvas id="gameCanvas"></canvas>
    
    <div class="instructions">DRAG FINGER TO STEER • DODGE DEBRIS</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 1. Dynamic Canvas Resizing for Mobile
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        // Resize immediately and whenever the screen orientation changes
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let distance = 0;
        let gameOver = false;

        // Player Vessel (Starts a bit off the left edge)
        const player = {
            x: Math.min(100, window.innerWidth * 0.15), 
            y: canvas.height / 2,
            targetY: canvas.height / 2,
            smoothing: 0.25 // Slightly faster smoothing for responsive touch
        };

        // Cosmic Starfield
        const stars = [];
        for(let i=0; i<150; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2.5,
                speed: Math.random() * 4 + 0.5
            });
        }

        // Asteroids
        const asteroids = [];
        function spawnAsteroid() {
            if (gameOver) return;
            asteroids.push({
                x: canvas.width + 50,
                y: Math.random() * canvas.height,
                radius: Math.random() * 18 + 8,
                speed: Math.random() * 5 + 3,
                rotation: 0,
                rotSpeed: (Math.random() - 0.5) * 0.05
            });
            setTimeout(spawnAsteroid, Math.random() * 800 + 400);
        }
        spawnAsteroid();

        // 2. Mobile Touch and Desktop Mouse Controls
        canvas.addEventListener('mousemove', (e) => {
            player.targetY = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            player.targetY = e.touches[0].clientY;
            e.preventDefault(); // Prevents the screen from moving while dragging the ship
        }, { passive: false });

        function drawSpacecraft(x, y) {
            ctx.save();
            ctx.translate(x, y);

            // Engine Plasma Trail
            let trailLength = Math.random() * 25 + 15;
            let gradient = ctx.createLinearGradient(-10, 0, -trailLength, 0);
            gradient.addColorStop(0, '#00ffff');
            gradient.addColorStop(0.3, '#ff00aa');
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.moveTo(-10, -6);
            ctx.lineTo(-trailLength, 0);
            ctx.lineTo(-10, 6);
            ctx.closePath();
            ctx.fill();

            // Main Hull
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.moveTo(35, 0);
            ctx.lineTo(-15, -14);
            ctx.lineTo(-8, 0);
            ctx.lineTo(-15, 14);
            ctx.closePath();
            ctx.fill();

            // Cockpit Glow
            ctx.fillStyle = '#00ffff';
            ctx.beginPath();
            ctx.ellipse(12, 0, 8, 3, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        // Main Game Loop
        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Render Galaxy Starfield
            stars.forEach(star => {
                if (!gameOver) star.x -= star.speed;
                if (star.x < 0) {
                    star.x = canvas.width;
                    star.y = Math.random() * canvas.height; // Wrap around smoothly
                }
                ctx.fillStyle = `rgba(255, 255, 255, ${star.size / 2.5})`;
                ctx.fillRect(star.x, star.y, star.size, star.size);
            });

            // Track & Draw Ship
            player.y += (player.targetY - player.y) * player.smoothing;
            if (player.y < 25) player.y = 25;
            if (player.y > canvas.height - 25) player.y = canvas.height - 25;
            
            drawSpacecraft(player.x, player.y);

            // Process Asteroids
            asteroids.forEach((ast, idx) => {
                if (!gameOver) {
                    ast.x -= ast.speed;
                    ast.rotation += ast.rotSpeed;
                }

                ctx.save();
                ctx.translate(ast.x, ast.y);
                ctx.rotate(ast.rotation);
                
                ctx.fillStyle = '#2d2d3d';
                ctx.strokeStyle = '#565676';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(0, 0, ast.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
                ctx.restore();

                // Hitbox detection
                let dist = Math.hypot(player.x - ast.x, player.y - ast.y);
                if (dist < ast.radius + 14) {
                    gameOver = true;
                }

                if (ast.x < -60) asteroids.splice(idx, 1);
            });

            // Score HUD & Game Over Screen
            if (!gameOver) {
                distance += 0.2;
                document.getElementById('score').innerText = `DISTANCE: ${Math.floor(distance)} LY`;
            } else {
                ctx.fillStyle = 'rgba(2, 2, 8, 0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Scale game over text for smaller mobile screens
                let isMobile = canvas.width < 600;
                
                ctx.fillStyle = '#ff3366';
                ctx.font = `bold ${isMobile ? 24 : 36}px monospace`;
                ctx.textAlign = 'center';
                ctx.fillText('HULL COMPROMISED', canvas.width / 2, canvas.height / 2 - 20);
                
                ctx.fillStyle = '#ffffff';
                ctx.font = `${isMobile ? 14 : 18}px monospace`;
                ctx.fillText(`Navigated ${Math.floor(distance)} Light Years`, canvas.width / 2, canvas.height / 2 + 20);
                
                ctx.fillStyle = '#00ffff';
                ctx.fillText('TAP ANYWHERE TO RE-LAUNCH', canvas.width / 2, canvas.height / 2 + 60);
            }

            requestAnimationFrame(loop);
        }

        // 3. Restart Handler (Works for both click and touch)
        const handleRestart = (e) => {
            if (gameOver) {
                asteroids.length = 0;
                distance = 0;
                gameOver = false;
                player.y = canvas.height / 2;
                player.targetY = canvas.height / 2;
                spawnAsteroid();
            }
        };

        window.addEventListener('click', handleRestart);
        window.addEventListener('touchstart', handleRestart, { passive: false });

        loop();
    </script>
</body>
</html>
